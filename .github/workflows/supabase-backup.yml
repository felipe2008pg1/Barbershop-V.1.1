name: Supabase Backup

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday, 03:00 UTC
  workflow_dispatch: {}    # allows you to run manually in Actions > Run workflow

permissions:
  contents: write   # necessary only to create the Release; nothing more than that

concurrency:
  group: supabase-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    container:
      image: postgres:17-alpine   # includes pg_dump; must be >= the Supabase server version
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      GPG_PASSPHRASE: ${{ secrets.BACKUP_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate existing secrets
        run: |
          if [ -z "$SUPABASE_DB_URL" ] || [ -z "$GPG_PASSPHRASE" ]; then
            echo "::error::Secrets SUPABASE_DB_URL e/ou BACKUP_GPG_PASSPHRASE não configurados."
            exit 1
          fi

      - name: Install gnupg, bash and GitHub CLI
        run: |
          apk add --no-cache gnupg bash github-cli

      - name: To generate dump (without exposing the connection string in the logs)
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y%m%d_%H%M%S)
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          pg_dump "$SUPABASE_DB_URL?sslmode=require" \
            --no-owner --no-acl --format=plain \
            --file="backup_${STAMP}.sql" 2> dump_error.log
        env:
          PGCONNECT_TIMEOUT: 15

      - name: Display a generic error in case of failure (without leaking the connection string)
        if: failure()
        run: |
          echo "pg_dump failed. Check credentials and connectivity."
          grep -v -i "postgresql://" dump_error.log || true

      - name: Encrypt dump (AES-256, simétrico)
        run: |
          gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
              --symmetric --cipher-algo AES256 \
              --output "backup_${STAMP}.sql.gpg" \
              "backup_${STAMP}.sql"
          shred -u "backup_${STAMP}.sql"   # Removes the plaintext .sql from the runner

      - name: Publish as a Release to the private backup repository.
        run: |
          gh release create "backup-${STAMP}" \
            "backup_${STAMP}.sql.gpg" \
            --repo "${{ secrets.BACKUP_REPO }}" \
            --title "Backup ${STAMP}" \
            --notes "Supabase automatic backup. Encrypted file. (GPG/AES256)." \
            --latest=false
        env:
          GH_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}

      - name: Clean up old backups (keep the last 8)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t releases < <(gh release list --repo "${{ secrets.BACKUP_REPO }}" \
            --limit 200 --json tagName,createdAt \
            --jq '.[] | select(.tagName | startswith("backup-")) | .tagName' )
          total=${#releases[@]}
          keep=8
          if [ "$total" -gt "$keep" ]; then
            to_delete=("${releases[@]:keep}")
            for tag in "${to_delete[@]}"; do
              echo "Removing old release: $tag"
              gh release delete "$tag" --repo "${{ secrets.BACKUP_REPO }}" --yes --cleanup-tag
            done
          fi
        env:
          GH_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
